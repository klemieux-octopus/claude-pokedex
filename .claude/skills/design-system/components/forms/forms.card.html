<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--paper);padding:24px;font-family:var(--font-ui)}
  .cap{font:var(--w-bold) 10px/1 var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
  .row{display:flex;gap:24px;align-items:center;margin-bottom:20px;flex-wrap:wrap}</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { SearchInput, Toggle } = window.PokDexDesignSystem_ec2824;
function Demo(){
  const [q,setQ]=React.useState('Chariz');
  const [a,setA]=React.useState(true);
  const [b,setB]=React.useState(false);
  return (<>
    <div className="cap">SearchInput</div>
    <div style={{maxWidth:420,marginBottom:22}}>
      <SearchInput value={q} onChange={e=>setQ(e.target.value)} icon={<span style={{fontSize:16}}>⌕</span>} />
    </div>
    <div className="cap">Toggle</div>
    <div className="row">
      <Toggle checked={a} onChange={setA} label="Shiny sprites"/>
      <Toggle checked={b} onChange={setB} label="Caught only"/>
      <Toggle checked={false} disabled label="Disabled"/>
    </div>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
