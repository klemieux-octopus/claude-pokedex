<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--paper);padding:22px;font-family:var(--font-ui)}
  .grid{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .cap{font:var(--w-bold) 10px/1 var(--font-mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { PokemonCard, TypeBadge, StatBar, Badge } = window.PokDexDesignSystem_ec2824;
function Demo(){
  return (<div className="grid">
    <div>
      <div className="cap">PokemonCard</div>
      <PokemonCard number={6} name="Emberwing" types={['fire','flying']} />
    </div>
    <div>
      <div className="cap">TypeBadge</div>
      <div className="row">
        <TypeBadge type="fire"/><TypeBadge type="water"/><TypeBadge type="grass"/>
        <TypeBadge type="electric"/><TypeBadge type="psychic"/><TypeBadge type="dragon"/>
      </div>
      <div className="cap">Badge</div>
      <div className="row">
        <Badge tone="neutral">Gen I</Badge><Badge tone="accent">Kanto</Badge>
        <Badge tone="brand">Legendary</Badge><Badge tone="success">Caught</Badge>
      </div>
      <div className="cap">StatBar</div>
      <StatBar label="HP" value={78}/>
      <div style={{height:8}}></div>
      <StatBar label="ATK" value={130}/>
      <div style={{height:8}}></div>
      <StatBar label="DEF" value={50}/>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
