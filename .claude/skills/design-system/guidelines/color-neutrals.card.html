<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & shell casing" subtitle="Charcoal to warm paper" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--white);padding:20px;display:flex;gap:0;flex-wrap:wrap}
  .sw{width:calc(100%/7);height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box}
  .n{font:var(--w-semibold) 11px/1.2 var(--font-ui)}
  .h{font:var(--w-bold) 9px/1 var(--font-mono);opacity:.7;margin-top:2px}
</style></head><body>
  <div class="sw" style="background:var(--ink-900);color:#fff"><span class="n">ink 900</span><span class="h">#17181C</span></div>
  <div class="sw" style="background:var(--ink-700);color:#fff"><span class="n">ink 700</span><span class="h">#2B2D34</span></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><span class="n">ink 500</span><span class="h">#565A66</span></div>
  <div class="sw" style="background:var(--ink-300)"><span class="n">ink 300</span><span class="h">#9AA0AE</span></div>
  <div class="sw" style="background:var(--ink-100)"><span class="n">ink 100</span><span class="h">#E4E7ED</span></div>
  <div class="sw" style="background:var(--paper);border:1px solid var(--ink-100)"><span class="n">paper</span><span class="h">#F5F6EF</span></div>
  <div class="sw" style="background:var(--lcd);border:1px solid var(--lcd-line)"><span class="n">lcd</span><span class="h">#DCE6D5</span></div>
</body></html>
