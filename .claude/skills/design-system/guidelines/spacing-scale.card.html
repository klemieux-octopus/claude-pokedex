<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--white);padding:22px;display:flex;align-items:flex-end;gap:14px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--poke-red);border-radius:var(--r-sm)}
  .n{font:var(--w-bold) 11px/1 var(--font-mono);color:var(--text-muted)}
</style></head><body>
  <div class="cell"><span class="bar" style="width:4px;height:4px"></span><span class="n">1·4</span></div>
  <div class="cell"><span class="bar" style="width:8px;height:8px"></span><span class="n">2·8</span></div>
  <div class="cell"><span class="bar" style="width:12px;height:12px"></span><span class="n">3·12</span></div>
  <div class="cell"><span class="bar" style="width:16px;height:16px"></span><span class="n">4·16</span></div>
  <div class="cell"><span class="bar" style="width:24px;height:24px"></span><span class="n">6·24</span></div>
  <div class="cell"><span class="bar" style="width:32px;height:32px"></span><span class="n">8·32</span></div>
  <div class="cell"><span class="bar" style="width:48px;height:48px"></span><span class="n">12·48</span></div>
  <div class="cell"><span class="bar" style="width:64px;height:64px"></span><span class="n">16·64</span></div>
</body></html>
