<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--poke-red);padding:30px;display:flex;align-items:center;gap:34px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:120px;height:74px;background:var(--poke-red);border-radius:var(--r-lg)}
  .n{font:var(--w-medium) 12px/1 var(--font-mono);color:rgba(255,255,255,.9)}
</style></head><body>
  <div class="cell"><span class="box" style="box-shadow:var(--emboss)"></span><span class="n">emboss · raised</span></div>
  <div class="cell"><span class="box" style="box-shadow:var(--deboss)"></span><span class="n">deboss · pressed</span></div>
</body></html>
