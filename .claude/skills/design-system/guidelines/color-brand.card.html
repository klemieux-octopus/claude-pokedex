<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--white);padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:150px;height:96px;border-radius:var(--r-md);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;color:#fff}
  .n{font:var(--w-semibold) 14px/1 var(--font-ui)}
  .h{font:var(--w-bold) 11px/1 var(--font-mono);opacity:.8;margin-top:3px}
</style></head><body>
  <div class="sw" style="background:var(--poke-red)"><span class="n">Red</span><span class="h">#D3222A</span></div>
  <div class="sw" style="background:var(--poke-red-deep)"><span class="n">Red deep</span><span class="h">#A81419</span></div>
  <div class="sw" style="background:var(--poke-blue)"><span class="n">Lens blue</span><span class="h">#2C74B3</span></div>
  <div class="sw" style="background:var(--poke-blue-hi);color:var(--ink-900)"><span class="n">Blue glint</span><span class="h">#6FB6FF</span></div>
</body></html>
