<!-- @dsCard group="Colors" viewport="700x210" name="Elemental type palette" subtitle="The 18 canonical type colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--white);padding:18px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
  .t{height:48px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:#fff;font:var(--w-semibold) 12px/1 var(--font-ui);text-transform:uppercase;letter-spacing:.08em;box-shadow:inset 0 -2px 4px rgba(0,0,0,.18)}
</style></head><body>
  <div class="t" style="background:var(--type-normal)">Normal</div>
  <div class="t" style="background:var(--type-fire)">Fire</div>
  <div class="t" style="background:var(--type-water)">Water</div>
  <div class="t" style="background:var(--type-grass)">Grass</div>
  <div class="t" style="background:var(--type-electric)">Electr</div>
  <div class="t" style="background:var(--type-ice)">Ice</div>
  <div class="t" style="background:var(--type-fighting)">Fight</div>
  <div class="t" style="background:var(--type-poison)">Poison</div>
  <div class="t" style="background:var(--type-ground)">Ground</div>
  <div class="t" style="background:var(--type-flying)">Flying</div>
  <div class="t" style="background:var(--type-psychic)">Psychic</div>
  <div class="t" style="background:var(--type-bug)">Bug</div>
  <div class="t" style="background:var(--type-rock)">Rock</div>
  <div class="t" style="background:var(--type-ghost)">Ghost</div>
  <div class="t" style="background:var(--type-dragon)">Dragon</div>
  <div class="t" style="background:var(--type-dark)">Dark</div>
  <div class="t" style="background:var(--type-steel)">Steel</div>
  <div class="t" style="background:var(--type-fairy)">Fairy</div>
</body></html>
