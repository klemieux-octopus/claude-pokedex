<!-- @dsCard group="Brand" viewport="700x180" name="Elevation" subtitle="Soft modern drop shadows" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--ink-100);padding:30px;display:flex;align-items:center;gap:34px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:110px;height:74px;background:var(--white);border-radius:var(--r-md)}
  .n{font:var(--w-medium) 12px/1 var(--font-mono);color:var(--text-muted)}
</style></head><body>
  <div class="cell"><span class="box" style="box-shadow:var(--shadow-1)"></span><span class="n">shadow-1</span></div>
  <div class="cell"><span class="box" style="box-shadow:var(--shadow-2)"></span><span class="n">shadow-2</span></div>
  <div class="cell"><span class="box" style="box-shadow:var(--shadow-3)"></span><span class="n">shadow-3</span></div>
</body></html>
