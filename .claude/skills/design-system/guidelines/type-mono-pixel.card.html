<!-- @dsCard group="Type" viewport="700x150" name="Mono & Pixel" subtitle="Space Mono for numbers · Press Start 2P for retro accents" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--lcd);padding:22px;display:flex;align-items:center;gap:40px}
  .col{display:flex;flex-direction:column;gap:8px}
  .meta{font:var(--w-medium) 11px/1 var(--font-mono);color:var(--text-on-screen);opacity:.7;text-transform:uppercase;letter-spacing:.1em}
  .mono{font:var(--w-bold) 30px/1 var(--font-mono);color:var(--text-on-screen)}
  .pixel{font:16px/1.4 var(--font-pixel);color:var(--text-on-screen)}
</style></head><body>
  <div class="col"><span class="meta">Space Mono</span><span class="mono">#0006 · 90.5kg</span></div>
  <div class="col"><span class="meta">Press Start 2P</span><span class="pixel">LV. 36</span></div>
</body></html>
