<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Soft modern controls, never sharp" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--white);padding:22px;display:flex;align-items:center;gap:20px}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:72px;background:var(--ink-100);border:2px solid var(--ink-300)}
  .n{font:var(--w-bold) 11px/1 var(--font-mono);color:var(--text-muted)}
</style></head><body>
  <div class="cell"><span class="box" style="border-radius:var(--r-sm)"></span><span class="n">sm 6</span></div>
  <div class="cell"><span class="box" style="border-radius:var(--r-md)"></span><span class="n">md 10</span></div>
  <div class="cell"><span class="box" style="border-radius:var(--r-lg)"></span><span class="n">lg 16</span></div>
  <div class="cell"><span class="box" style="border-radius:var(--r-xl)"></span><span class="n">xl 24</span></div>
  <div class="cell"><span class="box" style="border-radius:var(--r-shell)"></span><span class="n">shell 28</span></div>
  <div class="cell"><span class="box" style="border-radius:var(--r-pill)"></span><span class="n">pill</span></div>
</body></html>
