<!-- @startingPoint section="Pokédex App" subtitle="Full handheld dex — list + detail flow" viewport="470x760" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pokédex</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 20%, #2b2d34, #17181c); padding: 28px; font-family: var(--font-ui); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="DeviceShell.jsx"></script>
<script type="text/babel" src="DexListScreen.jsx"></script>
<script type="text/babel" src="DexDetailScreen.jsx"></script>
<script type="text/babel">
function App() {
  const [selected, setSelected] = React.useState(null);
  return (
    <DeviceShell onHome={() => setSelected(null)} statusText={selected ? 'ENTRY ' + String(selected.number).padStart(3,'0') : 'BROWSING · 12 SEEN'}>
      {selected
        ? <DexDetailScreen entry={selected} onBack={() => setSelected(null)} />
        : <DexListScreen onSelect={setSelected} />}
    </DeviceShell>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
